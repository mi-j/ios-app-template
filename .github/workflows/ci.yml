name: CI

# Push / PR signal for the swarm: lint + unit + UI tests.
# Deliberate shipping (TestFlight / App Store) lives in release.yml
# (workflow_dispatch + v* tags) so a failing-on-signing upload can't
# keep main permanently red before the App Store gate is cleared.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SCHEME: __APP_NAME__
  UI_TEST_SCHEME: __APP_NAME__UITests
  APP_IDENTIFIER: __BUNDLE_ID__
  TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
  APPLE_ID: ${{ secrets.APPLE_ID }}

jobs:
  lint:
    name: SwiftLint
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: vendor/bundle
          key: gems-${{ hashFiles('Gemfile.lock') }}
          restore-keys: gems-
      - name: Install Bundler dependencies
        run: bundle config set --local path vendor/bundle && bundle install
      - name: Install SwiftLint
        run: |
          if ! command -v swiftlint >/dev/null 2>&1; then
            brew install swiftlint
          fi
      - name: Run SwiftLint
        run: bundle exec fastlane lint
        continue-on-error: true   # noise reduction; lint shouldn't block the build. Gate later.

  test:
    name: Build & Test
    runs-on: macos-15   # Xcode 16 — reads the format-77 project XcodeGen emits (macos-14/Xcode 15 cannot)
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: vendor/bundle
          key: gems-${{ hashFiles('Gemfile.lock') }}
          restore-keys: gems-
      - name: Install Bundler dependencies
        run: bundle config set --local path vendor/bundle && bundle install
      - name: Generate Xcode project (XcodeGen)
        run: |
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          fi
          xcodegen generate
          ls -la *.xcodeproj
      - name: Run tests
        run: bundle exec fastlane test
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: fastlane/test_output/

  ui_test:
    name: UI Tests (XCUITest)
    runs-on: macos-15   # Xcode 16 — reads the format-77 project XcodeGen emits
    needs: lint
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: vendor/bundle
          key: gems-${{ hashFiles('Gemfile.lock') }}
          restore-keys: gems-
      - name: Install Bundler dependencies
        run: bundle config set --local path vendor/bundle && bundle install
      - name: Generate Xcode project (XcodeGen)
        run: |
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          fi
          xcodegen generate
          ls -la *.xcodeproj
      - name: Run UI tests
        run: bundle exec fastlane ui_test
      - name: Upload UI test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-results
          path: |
            fastlane/ui_test_output/
            fastlane/test_output/*.xcresult
