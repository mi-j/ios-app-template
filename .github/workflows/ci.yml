name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SCHEME: __APP_NAME__
  UI_TEST_SCHEME: __APP_NAME__UITests
  APP_IDENTIFIER: __BUNDLE_ID__
  TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
  APPLE_ID: ${{ secrets.APPLE_ID }}

jobs:
  lint:
    name: SwiftLint
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: vendor/bundle
          key: gems-${{ hashFiles('Gemfile.lock') }}
          restore-keys: gems-
      - name: Install Bundler dependencies
        run: bundle config set --local path vendor/bundle && bundle install
      - name: Run SwiftLint
        run: bundle exec fastlane lint

  test:
    name: Build & Test
    runs-on: macos-14
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: vendor/bundle
          key: gems-${{ hashFiles('Gemfile.lock') }}
          restore-keys: gems-
      - name: Install Bundler dependencies
        run: bundle config set --local path vendor/bundle && bundle install
      - name: Run tests
        run: bundle exec fastlane test
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: fastlane/test_output/

  ui_test:
    name: UI Tests (XCUITest)
    runs-on: macos-14
    needs: lint
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: vendor/bundle
          key: gems-${{ hashFiles('Gemfile.lock') }}
          restore-keys: gems-
      - name: Install Bundler dependencies
        run: bundle config set --local path vendor/bundle && bundle install
      - name: Run UI tests
        run: bundle exec fastlane ui_test
      - name: Upload UI test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-results
          path: |
            fastlane/ui_test_output/
            fastlane/test_output/*.xcresult

  archive:
    name: Archive (dry-run)
    runs-on: macos-14
    needs: [test, ui_test]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: vendor/bundle
          key: gems-${{ hashFiles('Gemfile.lock') }}
          restore-keys: gems-
      - name: Install Bundler dependencies
        run: bundle config set --local path vendor/bundle && bundle install
      - name: Sync signing (read-only)
        run: bundle exec fastlane sync_signing
        env:
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
      - name: Build archive
        run: bundle exec fastlane build
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: __APP_NAME__-${{ github.sha }}.ipa
          path: build/*.ipa
          retention-days: 7

  testflight:
    name: Upload to TestFlight
    runs-on: macos-14
    needs: [test, ui_test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: testflight
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/cache@v4
        with:
          path: vendor/bundle
          key: gems-${{ hashFiles('Gemfile.lock') }}
          restore-keys: gems-
      - name: Install Bundler dependencies
        run: bundle config set --local path vendor/bundle && bundle install
      - name: Upload beta to TestFlight
        run: bundle exec fastlane beta
        env:
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_CHANNEL: ${{ vars.SLACK_CHANNEL }}

  release:
    name: Release to App Store Connect
    runs-on: macos-14
    needs: [test, ui_test]
    if: startsWith(github.ref, 'refs/tags/v')
    environment: appstore
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/cache@v4
        with:
          path: vendor/bundle
          key: gems-${{ hashFiles('Gemfile.lock') }}
          restore-keys: gems-
      - name: Install Bundler dependencies
        run: bundle config set --local path vendor/bundle && bundle install
      - name: Upload to App Store Connect
        run: bundle exec fastlane release
        env:
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_CHANNEL: ${{ vars.SLACK_CHANNEL }}
