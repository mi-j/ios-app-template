name: __APP_NAME__

options:
  bundleIdPrefix: __BUNDLE_ID_PREFIX__
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.3"
  createIntermediateGroups: true

# Applied to every target. The template declares INFOPLIST_KEY_* values, which
# only take effect with a generated Info.plist, but never enabled generation —
# so codesign failed with "target does not have an Info.plist file". Enable it
# globally; per-target INFOPLIST_KEY_* settings then populate the generated plist.
settings:
  base:
    GENERATE_INFOPLIST_FILE: "YES"

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.5.0"
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios
    from: "4.43.0"

targets:
  __APP_NAME__:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Sources/__APP_NAME__
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: __BUNDLE_ID__
        SWIFT_VERSION: "5.9"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0.0
        ENABLE_USER_SCRIPT_SANDBOXING: "NO"
        # Auto-answer App Store Connect's "Missing Compliance" export-control prompt.
        # Only takes effect when the spawned app uses GENERATE_INFOPLIST_FILE = YES
        # (the modern, build-setting-driven Info.plist path). For apps that commit
        # an Info.plist, add <key>ITSAppUsesNonExemptEncryption</key><false/> there.
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: "NO"
        # Bundle-completeness keys for the generated Info.plist. Without these,
        # App Store upload rejects the build (missing launch screen / no
        # orientations declared — codes 90475/90474).
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        DEVELOPMENT_TEAM: F2DV5V68Z4
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
          DEBUG_INFORMATION_FORMAT: dwarf
        # Manual match signing for the device archive (release.yml). Kept out of
        # Debug so the simulator test job (ci.yml) builds unsigned.
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "match AppStore __BUNDLE_ID__"
    dependencies:
      - package: Supabase
        product: Supabase
      - package: RevenueCat
        product: RevenueCat
      - sdk: AuthenticationServices.framework

  __APP_NAME__Tests:
    type: bundle.unit-test
    platform: iOS
    sources: Tests/__APP_NAME__Tests
    dependencies:
      - target: __APP_NAME__
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: __BUNDLE_ID__.tests

  __APP_NAME__UITests:
    type: bundle.ui-testing
    platform: iOS
    sources: Tests/__APP_NAME__UITests
    dependencies:
      - target: __APP_NAME__
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: __BUNDLE_ID__.uitests
      TEST_TARGET_NAME: __APP_NAME__

schemes:
  __APP_NAME__:
    build:
      targets:
        __APP_NAME__: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - __APP_NAME__Tests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  __APP_NAME__UITests:
    build:
      targets:
        __APP_NAME__: all
        __APP_NAME__UITests: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - __APP_NAME__UITests
    profile:
      config: Debug
    analyze:
      config: Debug
    archive:
      config: Debug
