name: __APP_NAME__

options:
  bundleIdPrefix: __BUNDLE_ID_PREFIX__
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.3"
  createIntermediateGroups: true

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.5.0"
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios
    from: "4.43.0"

targets:
  __APP_NAME__:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Sources/__APP_NAME__
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: __BUNDLE_ID__
        SWIFT_VERSION: "5.9"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0.0
        ENABLE_USER_SCRIPT_SANDBOXING: "NO"
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
          DEBUG_INFORMATION_FORMAT: dwarf
        Release: {}
    dependencies:
      - package: Supabase
        product: Supabase
      - package: RevenueCat
        product: RevenueCat
      - sdk: AuthenticationServices.framework

  __APP_NAME__Tests:
    type: bundle.unit-test
    platform: iOS
    sources: Tests/__APP_NAME__Tests
    dependencies:
      - target: __APP_NAME__
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: __BUNDLE_ID__.tests

  __APP_NAME__UITests:
    type: bundle.ui-testing
    platform: iOS
    sources: Tests/__APP_NAME__UITests
    dependencies:
      - target: __APP_NAME__
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: __BUNDLE_ID__.uitests
      TEST_TARGET_NAME: __APP_NAME__

schemes:
  __APP_NAME__:
    build:
      targets:
        __APP_NAME__: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - __APP_NAME__Tests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  __APP_NAME__UITests:
    build:
      targets:
        __APP_NAME__: all
        __APP_NAME__UITests: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - __APP_NAME__UITests
    profile:
      config: Debug
    analyze:
      config: Debug
    archive:
      config: Debug
